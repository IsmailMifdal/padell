# Reverse proxy Padel API — remplacer api.example.ma par votre domaine
# (sed -i 's/api.example.ma/api.mondomaine.ma/g' nginx/padel.conf)

server {
    listen 80;
    server_name api.example.ma;

    # Challenge ACME (émission/renouvellement Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.example.ma;

    ssl_certificate     /etc/letsencrypt/live/api.example.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.ma/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    # API REST + documentation Swagger
    location / {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # WebSocket (chat temps réel /socket.io)
    location /socket.io/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
