# Production — VPS unique (docs/02 §7) : API + PostgreSQL + Redis + Nginx/HTTPS
#
#   cp .env.example .env   # remplir les secrets
#   docker compose -f docker-compose.prod.yml up -d --build
#
services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-padel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?définir POSTGRES_PASSWORD dans .env}
      POSTGRES_DB: ${POSTGRES_DB:-padel}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-padel}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  api:
    build: ../backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-padel}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-padel}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api

  # Renouvellement automatique des certificats Let's Encrypt
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c 'trap exit TERM;
      while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'

  # Sauvegarde quotidienne de la base (dump compressé, rétention 30 jours)
  backup:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: >
      /bin/sh -c 'while :; do
        pg_dump -h db -U ${POSTGRES_USER:-padel} -Fc ${POSTGRES_DB:-padel}
          > /backups/padel-$$(date +%Y%m%d-%H%M).dump
        && find /backups -name "*.dump" -mtime +30 -delete
        && echo "backup ok $$(date)";
        sleep 86400; done'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  certbot_www:
  letsencrypt:
